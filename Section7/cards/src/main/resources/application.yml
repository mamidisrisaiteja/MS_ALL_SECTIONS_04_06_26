server:
  port: 9000
spring:
  application:
    name: "cards"
  profiles:
    acitve: "qa"
  datasource:
    url: jdbc:mysql://localhost:3308/cardsdb
    username: root
    password: root
  jpa:
    show-sql: true
  sql:
    init:
      mode: always
  config:
    import: "optional:configserver:http://localhost:8071"

  cloud:
    bus:
      id: cards:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"

