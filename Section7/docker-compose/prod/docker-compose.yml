services:
  accountsdb:
    image: mysql
    container_name: accountsdb
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: accountsdb
    extends:
      file: common-config.yml
      service: microservice-db-config

  cardsdb:
    image: mysql
    container_name: cardsdb
    ports:
      - 3308:3306

    environment:
      MYSQL_DATABASE: cardsdb
    extends:
      file: common-config.yml
      service: microservice-db-config

  loansdb:
    image: mysql
    container_name: loansdb
    ports:
      - 3307:3306

    environment:
      MYSQL_DATABASE: loansdb
    extends:
      file: common-config.yml
      service: microservice-db-config

  configserver:
    image: "mamidisrisaiteja/configserver:s7"
    container_name: configserver-ms
    ports:
      - "8071:8071"
    extends:
      file: common-config.yml
      service: microservice-base-config

  accounts:
    image: "mamidisrisaiteja/accounts:s7"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    restart: always
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATA_SOURCE_URL: "jdbc:mysql://accountsdb:3306/accountsdb"
    depends_on:
      - configserver
      - accountsdb





    extends:
      file: common-config.yml
      service: microservice-configserver-config


  loans:
    image: "mamidisrisaiteja/loans:s7"
    container_name: loans-ms
    ports:
      - "8090:8090"
    restart: always
    depends_on:
      - loansdb
      - configserver



    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATA_SOURCE_URL: "jdbc:mysql://loansdb:3306/loansdb"

    extends:
      file: common-config.yml
      service: microservice-configserver-config


  cards:
    image: "mamidisrisaiteja/cards:s7"
    container_name: cards-ms
    ports:
      - "9000:9000"
    restart: always
    depends_on:
      - cardsdb
      - configserver


    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATA_SOURCE_URL: "jdbc:mysql://cardssdb:3306/cardsdb"
    extends:
      file: common-config.yml
      service: microservice-configserver-config


networks:
  eazybank:
    driver: "bridge"
